<svg xmlns="http://www.w3.org/2000/svg" width="360" height="56" viewBox="0 0 360 56" role="img" aria-label="Mana bar">
  <rect width="360" height="56" rx="10" fill="#0d1117" stroke="#30363d"/>
  <text x="16" y="22" fill="#e6edf3" font-family="Segoe UI,sans-serif" font-size="12" font-weight="600">Mana</text>
  <rect x="16" y="30" width="328" height="14" rx="7" fill="#161b22"/>
  <rect x="16" y="30" width="328" height="14" rx="7" fill="#58a6ff">
    <animate attributeName="width" values="328;260;328;200;328" dur="6s" repeatCount="indefinite"/>
  </rect>
  <circle cx="300" cy="37" r="5" fill="#7ee787" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>
